# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale
# You must relaunch Hyprland after changing any envs (use Super+Esc, then Relaunch)

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
# env = GDK_SCALE,2
# monitor=,preferred,auto,auto

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.666667


# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2

# Straight 1x setup for low-resolution displays like 1080p or 1440p
env = GDK_SCALE,1

$MONITOR_L = DP-2 # LG UltraGear
$MONITOR_R = DP-1 # DELL S2721DGF

monitor=$MONITOR_L, 2560x1440@165,  auto-left,	1
monitor=$MONITOR_R, 2560x1440@165,  auto-right,	1

workspace=8,	monitor:$MONITOR_L, persistent:true, default:true
workspace=9,	monitor:$MONITOR_L, persistent:true
workspace=10,	monitor:$MONITOR_L, persistent:true
workspace=11,	monitor:$MONITOR_L, persistent:true
workspace=12,	monitor:$MONITOR_L, persistent:true
workspace=13,	monitor:$MONITOR_L, persistent:true
workspace=14,	monitor:$MONITOR_L, persistent:true

workspace=1,	monitor:$MONITOR_R, persistent:true, default:true
workspace=2,	monitor:$MONITOR_R, persistent:true
workspace=3,	monitor:$MONITOR_R, persistent:true
workspace=4,	monitor:$MONITOR_R, persistent:true
workspace=5,	monitor:$MONITOR_R, persistent:true
workspace=6,	monitor:$MONITOR_R, persistent:true
workspace=7,	monitor:$MONITOR_R, persistent:true
