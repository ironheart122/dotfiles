# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows
    gaps_in = 4
    gaps_out = 4
    border_size = 2
    # Use master layout instead of dwindle
    # layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    rounding = 5
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    # Disable middle-click paste of the PRIMARY selection (highlight-to-paste).
    # Stops accidental pastes when middle-clicking into a chat box, etc.
    # The normal Ctrl+C / Ctrl+V clipboard is a separate buffer and is unaffected.
    middle_click_paste = false
}

# Force focused/active windows to be fully opaque (overrides omarchy defaults of 0.97 active)
windowrule = opacity 1.0 0.9, match:tag default-opacity
windowrule = opacity 1.0 0.9, match:tag terminal
